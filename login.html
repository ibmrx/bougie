<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Bougie Immigration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f4eddb 0%, #e8e0ce 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2c2b28;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%239b8e6e" fill-opacity="0.05"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            margin: 2rem;
            position: relative;
            z-index: 1;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .logo img {
            height: 60px;
            width: auto;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2c2b28;
        }

        .logo-text span {
            font-weight: 400;
            color: #6b6a66;
        }

        .tagline {
            color: #6b6a66;
            font-size: 0.875rem;
        }

        .login-card {
            background: #ffffff;
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #2c2b28;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #6b6a66;
            font-size: 0.875rem;
        }

        .lock-icon {
            width: 64px;
            height: 64px;
            background-color: #f4eddb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .lock-icon i {
            font-size: 2rem;
            color: #9b8e6e;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #2c2b28;
            font-size: 0.875rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9b8e6e;
            font-size: 1rem;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            border: 2px solid #dcdad5;
            border-radius: 16px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #ffffff;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #9b8e6e;
            box-shadow: 0 0 0 3px rgba(155, 142, 110, 0.1);
        }

        .input-wrapper input::placeholder {
            color: #c0bcb4;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #9b8e6e;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #2c2b28;
        }

        .login-btn {
            width: 100%;
            padding: 0.875rem;
            background-color: #2c2b28;
            color: #f4eddb;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .login-btn:hover:not(:disabled) {
            background-color: #4a4945;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: #6b6a66;
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-link a:hover {
            color: #2c2b28;
        }

        .error-message {
            background-color: #fee;
            border-left: 4px solid #e74c3c;
            padding: 0.875rem 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
            color: #c0392b;
        }

        .error-message.show {
            display: flex;
        }

        .error-message i {
            font-size: 1rem;
        }

        .login-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .login-btn.loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .security-notice {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #dcdad5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-size: 0.75rem;
            color: #9b8e6e;
        }

        .security-notice i {
            font-size: 0.875rem;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 1.5rem;
            }
            
            .logo img {
                height: 45px;
            }
            
            .logo-text {
                font-size: 1.25rem;
            }
            
            .login-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo">
                <img src="https://uploads.onecompiler.io/437muad7y/44hafv45b/blogo.jpg" alt="Bougie Immigration Logo" onerror="this.src='https://placehold.co/60x60/dcdad5/2c2b28?text=BI'">
                <div class="logo-text">Bougie <span>Immigration</span></div>
            </div>
            <div class="tagline">Administrative Portal</div>
        </div>

        <div class="login-card">
            <div class="login-header">
                <div class="lock-icon">
                    <i class="fas fa-lock"></i>
                </div>
                <h1>Admin Login</h1>
                <p>Enter your credentials to access the dashboard</p>
            </div>

            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid username or password</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="off" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Login to Dashboard</span>
                </button>
            </form>

            <div class="back-link">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i>
                    Back to Homepage
                </a>
            </div>

            <div class="security-notice">
                <i class="fas fa-shield-alt"></i>
                <span>Secure login • Access restricted to authorized personnel</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://qpprzcckolmdyabnmgol.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwcHJ6Y2Nrb2xtZHlhYm5tZ29sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjA5MTYsImV4cCI6MjA4OTkzNjkxNn0.Pp9fTdklyomxmG6wsb8FBzyhLXaXEx983ofdaiPG_So';
        
        let supabase = null;
        let isSubmitting = false;

        // Initialize Supabase
        function initSupabase() {
            if (typeof window.supabase !== 'undefined') {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } else if (typeof supabaseJs !== 'undefined') {
                supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
            return supabase;
        }

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const togglePassword = document.getElementById('togglePassword');

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 4000);
        }

        function hideError() {
            errorMessage.classList.remove('show');
        }

        function setLoading(isLoading) {
            if (isLoading) {
                loginBtn.classList.add('loading');
                loginBtn.innerHTML = '<i class="fas fa-spinner"></i><span>Verifying...</span>';
                loginBtn.disabled = true;
            } else {
                loginBtn.classList.remove('loading');
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i><span>Login to Dashboard</span>';
                loginBtn.disabled = false;
            }
        }

        function validateInputs() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            if (!username) {
                showError('Please enter your username');
                usernameInput.focus();
                return false;
            }
            
            if (!password) {
                showError('Please enter your password');
                passwordInput.focus();
                return false;
            }
            
            return true;
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            hideError();
            
            if (!validateInputs()) {
                return;
            }
            
            if (isSubmitting) return;
            isSubmitting = true;
            
            setLoading(true);
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            try {
                const client = initSupabase();
                
                if (client) {
                    // Query the admin_users table to verify credentials
                    const { data, error } = await client
                        .from('admin_users')
                        .select('id, username, role')
                        .eq('username', username)
                        .eq('is_active', true)
                        .single();
                    
                    if (error || !data) {
                        showError('Invalid username or password');
                        passwordInput.value = '';
                        passwordInput.focus();
                    } else {
                        // Verify password (in production, use proper password verification)
                        // For now, using a simple check - this should be replaced with proper password hashing
                        const { data: authData, error: authError } = await client.rpc('verify_admin_password', {
                            p_username: username,
                            p_password: password
                        });
                        
                        if (authError || !authData) {
                            showError('Invalid username or password');
                            passwordInput.value = '';
                            passwordInput.focus();
                        } else {
                            // Successful login
                            sessionStorage.setItem('admin_logged_in', 'true');
                            sessionStorage.setItem('admin_username', username);
                            sessionStorage.setItem('admin_role', data.role || 'admin');
                            sessionStorage.setItem('admin_login_time', new Date().toISOString());
                            
                            window.location.href = 'admin.html';
                        }
                    }
                } else {
                    // Fallback for demo - remove in production
                    showError('Authentication service unavailable. Please contact system administrator.');
                }
                
            } catch (error) {
                console.error('Login error:', error);
                showError('Authentication failed. Please try again later.');
                passwordInput.value = '';
                passwordInput.focus();
            } finally {
                setLoading(false);
                isSubmitting = false;
            }
        }

        function togglePasswordVisibility() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        }

        // Check if already logged in
        function checkExistingSession() {
            const loggedIn = sessionStorage.getItem('admin_logged_in');
            if (loggedIn === 'true') {
                window.location.href = 'admin.html';
            }
        }

        // Event Listeners
        loginForm.addEventListener('submit', handleLogin);
        togglePassword.addEventListener('click', togglePasswordVisibility);
        
        usernameInput.addEventListener('input', hideError);
        passwordInput.addEventListener('input', hideError);
        
        // Prevent XSS
        usernameInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[<>]/g, '');
        });
        
        // Initialize
        initSupabase();
        checkExistingSession();
    </script>
</body>
</html>
