<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Bougie Immigration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f4eddb 0%, #e8e0ce 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { width: 100%; max-width: 450px; margin: 2rem; }
        .logo-section { text-align: center; margin-bottom: 2rem; }
        .logo { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 1rem; }
        .logo img { height: 60px; width: auto; }
        .logo-text { font-size: 1.5rem; font-weight: 700; color: #2c2b28; }
        .logo-text span { font-weight: 400; color: #6b6a66; }
        .login-card { background: #fff; border-radius: 32px; padding: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .lock-icon { width: 64px; height: 64px; background: #f4eddb; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
        .lock-icon i { font-size: 2rem; color: #9b8e6e; }
        .login-header h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
        .login-header p { color: #6b6a66; font-size: 0.875rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 0.5rem; font-size: 0.875rem; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #9b8e6e; }
        .input-wrapper input { width: 100%; padding: 0.875rem 1rem 0.875rem 2.75rem; border: 2px solid #dcdad5; border-radius: 16px; font-size: 1rem; transition: all 0.3s; }
        .input-wrapper input:focus { outline: none; border-color: #9b8e6e; }
        .login-btn { width: 100%; padding: 0.875rem; background: #2c2b28; color: #f4eddb; border: none; border-radius: 50px; font-weight: 600; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.3s; }
        .login-btn:hover:not(:disabled) { background: #4a4945; transform: translateY(-2px); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .back-link { text-align: center; margin-top: 1.5rem; }
        .back-link a { color: #6b6a66; text-decoration: none; font-size: 0.875rem; display: inline-flex; align-items: center; gap: 0.5rem; }
        .error-message { background: #fee; border-left: 4px solid #e74c3c; padding: 0.875rem 1rem; border-radius: 12px; margin-bottom: 1.5rem; display: none; align-items: center; gap: 0.75rem; color: #c0392b; }
        .error-message.show { display: flex; }
        .security-notice { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #dcdad5; text-align: center; font-size: 0.75rem; color: #9b8e6e; }
        @media (max-width: 480px) { .login-card { padding: 1.5rem; } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo">
                <img src="https://uploads.onecompiler.io/437muad7y/44hafv45b/blogo.jpg" alt="Bougie Immigration Logo">
                <div class="logo-text">Bougie <span>Immigration</span></div>
            </div>
        </div>
        <div class="login-card">
            <div class="login-header">
                <div class="lock-icon"><i class="fas fa-lock"></i></div>
                <h1>Admin Login</h1>
                <p>Enter your credentials to access the dashboard</p>
            </div>
            <div class="error-message" id="errorMessage"><i class="fas fa-exclamation-circle"></i><span id="errorText">Invalid username or password</span></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Enter your username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                </div>
                <button type="submit" class="login-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Login to Dashboard</button>
            </form>
            <div class="back-link"><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Homepage</a></div>
            <div class="security-notice"><i class="fas fa-shield-alt"></i> Secure login • Access restricted to authorized personnel</div>
        </div>
    </div>
    <script>
        const ADMIN_CREDENTIALS = { username: 'admin', password: 'password123' };
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        let isSubmitting = false;

        function showError(message) { errorText.textContent = message; errorMessage.classList.add('show'); setTimeout(() => errorMessage.classList.remove('show'), 3000); }
        function hideError() { errorMessage.classList.remove('show'); }
        function setLoading(loading) { loginBtn.disabled = loading; loginBtn.innerHTML = loading ? '<i class="fas fa-spinner fa-spin"></i> Verifying...' : '<i class="fas fa-sign-in-alt"></i> Login to Dashboard'; }

        function handleLogin(e) {
            e.preventDefault();
            hideError();
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            if (!username || !password) { showError('Please enter both username and password'); return; }
            if (isSubmitting) return;
            isSubmitting = true;
            setLoading(true);
            setTimeout(() => {
                if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                    sessionStorage.setItem('admin_logged_in', 'true');
                    sessionStorage.setItem('admin_username', username);
                    sessionStorage.setItem('admin_login_time', new Date().toISOString());
                    window.location.href = 'admin.html';
                } else {
                    showError('Invalid username or password');
                    passwordInput.value = '';
                    passwordInput.focus();
                    setLoading(false);
                    isSubmitting = false;
                }
            }, 500);
        }
        loginForm.addEventListener('submit', handleLogin);
        usernameInput.addEventListener('input', hideError);
        passwordInput.addEventListener('input', hideError);
        if (sessionStorage.getItem('admin_logged_in') === 'true') window.location.href = 'admin.html';
    </script>
</body>
</html>
