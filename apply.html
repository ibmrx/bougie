<div class="form-container">
  <h2>Application Form</h2>
<link rel="stylesheet" href="css/style.css">

  <form id="form">
    <input type="text" placeholder="First Name" id="first" required>
    <input type="text" placeholder="Last Name" id="last" required>
    <input type="date" id="birth" required>
    <input type="text" placeholder="BAC Date" id="bac" required>
    <input type="email" placeholder="Email" id="email" required>
    <input type="text" placeholder="Phone" id="phone" required>
    <input type="text" placeholder="Courses" id="courses" required>

    <label>Dossier (ZIP)</label>
    <input type="file" id="dossier" required>

    <label>Payment Receipt (PDF)</label>
    <input type="file" id="receipt">

    <button class="btn" type="submit">Submit Application</button>
  </form>
</div>
